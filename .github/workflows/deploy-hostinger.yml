name: Deploy to Hostinger

on:
  push:
    branches:
      - frontend-only
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Create production environment
        working-directory: frontend
        run: |
          cat > .env << EOF
          EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_EVENT_ID=${{ secrets.EXPO_PUBLIC_EVENT_ID }}
          EXPO_PUBLIC_APP_NAME=${{ secrets.EXPO_PUBLIC_APP_NAME }}
          EXPO_PUBLIC_EXHIBITOR_LIST_URL=${{ secrets.EXPO_PUBLIC_EXHIBITOR_LIST_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_VAPID_KEY=${{ secrets.EXPO_PUBLIC_FIREBASE_VAPID_KEY }}
          EOF

      - name: Build static web export
        run: npm run build

      - name: Verify build output
        run: node scripts/verify-dist.mjs

      - name: Install Hostinger deploy dependencies
        run: npm install --no-save axios tus-js-client

      - name: Deploy to Hostinger via API
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_DOMAIN: ${{ secrets.HOSTINGER_DOMAIN }}
        run: node scripts/deploy-hostinger-api.mjs dist
